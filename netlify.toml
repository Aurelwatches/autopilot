[build]
  command = "npm run build"
  publish = "dist"

# React Router: serve index.html for every route
[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 200

# Security headers on every response
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options              = "DENY"
    X-Content-Type-Options       = "nosniff"
    Referrer-Policy              = "strict-origin-when-cross-origin"
    Permissions-Policy           = "camera=(), microphone=(), geolocation=()"
    X-XSS-Protection             = "1; mode=block"
    Content-Security-Policy      = "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' blob:; worker-src blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self';"

# Long-lived cache for hashed static assets
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
