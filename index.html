<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutoPilot — AI automation for restaurants</title>
    <meta name="description" content="AutoPilot handles Google reviews, social posts, and customer follow-ups for restaurants — automatically." />
    <meta name="theme-color" content="#05070D" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://www.getautopilot.net/" />
    <meta property="og:title"       content="AutoPilot — AI automation for restaurants" />
    <meta property="og:description" content="Your reviews get answered in your voice, every day — without you having to think about it." />
    <meta property="og:image"       content="https://www.getautopilot.net/og-image.png" />

    <!-- Twitter / X -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="AutoPilot — AI automation for restaurants" />
    <meta name="twitter:description" content="Your reviews get answered in your voice, every day — without you having to think about it." />
    <meta name="twitter:image"       content="https://www.getautopilot.net/og-image.png" />

    <!-- v2 -->
    <!-- Canonical -->
    <link rel="canonical" href="https://www.getautopilot.net/" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700;12..96,800&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <!-- Synchronously apply saved theme before React hydrates to prevent flash -->
    <script>(function(){var t=localStorage.getItem('ap_theme');if(t==='light')document.documentElement.dataset.theme='light';})()</script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
